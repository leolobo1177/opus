<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" role="img" aria-labelledby="title desc">
  <title id="title">Feixe de luz 15 graus</title>
  <desc id="desc">Feixe de luz estreito em fundo escuro.</desc>
