<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" role="img" aria-labelledby="title desc">
  <title id="title">Feixe de luz 24 graus</title>
  <desc id="desc">Feixe de luz médio em fundo escuro.</desc>
